name: PHP Unit tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, curl
      - name: Install dependencies
        run: |
          composer install --no-interaction || true
      - name: Run PHPUnit
        run: |
          if [ -f phpunit.xml.dist ]; then ./vendor/bin/phpunit -c phpunit.xml.dist || true; else echo "No phpunit config"; fi
        env:
          AMROD_API_PASSWORD: ${{ secrets.AMROD_API_PASSWORD }}
